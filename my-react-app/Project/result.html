<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="result-container">

        <div class="result-box">

            <h1>Interview Completed</h1>

            <h2>Your Score: {{ score }}/100</h2>

            {% if score >= 80 %}
                <p class="excellent">
                    Excellent Performance! You are interview ready.
                </p>

            {% elif score >= 60 %}
                <p class="good">
                    Good Performance! Keep practicing to improve.
                </p>

            {% else %}
                <p class="needs-improvement">
                    Needs Improvement. Practice more technical and HR questions.
                </p>
            {% endif %}

            <a href="/" class="home-btn">
                Take Interview Again
            </a>

        </div>

    </div>

</body>
</html>
